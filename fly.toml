app = "controle-links-pb"
primary_region = "gru"

[build]

[mounts]
  source = "pb_data"
  destination = "/pb/pb_data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"
